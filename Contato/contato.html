   <!DOCTYPE html>
   <html lang="pt-br">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
   </head>
   <body>
     <h2><u><u><mark style="background-color:rgba(110, 84, 202, 0.233);">Entre em contato para solicitar um orçamento!</mark></h2>
     <img src="profissional-certo-para-criar-um-site.jpg" alt="" width="500" height="290">
     <table border="3">
    <tr>
        <td>
            <form action="#">
            <label>Nome Completo:</label>
            <input type="text" placeholder="Digite seu nome" required>
    </tr>
    <tr>
        <td>
            <label>E-mail:</label>
            <input type="email" placeholder="email@exemplo.com" required>
        </td>
    </tr>
<br><br>
    <tr>
        <td>
        <label>Pessoa:</label><br>
        <input type="radio" name="tipo" value="PF"> Física
        <input type="radio" name="tipo" value="PJ"> Jurídica 
        <br>
        </td>
    </tr>
    <tr>   
        <td>
        <label>Serviço de interesse:</label>
        <select>
            <option>Site de 1 a 2 páginas</option>
            <option>Site de 3 a 5 páginas</option>
            <option>Site Avançado</option>
        </select>
        </td>
    </tr> 
<br><br>
    <tr>
        <td>
            <label>Melhor horário para contato:</label><br>
            <input type="checkbox"> Manhã
            <input type="checkbox"> Tarde
            <input type="checkbox"> Noite 
        </td>
        <br><br>
    </tr>
    <tr>
        <td>
        <label>Descrição do que deseja:</label>
        <br>
        <textarea rows="5" placeholder="Conte-me sobre seu projeto..."></textarea>
        </td>
    </tr>
<br><br>
    <tr>
        <td>
        <input type="submit" value="Solicitar Orçamento" class="btn">
        </td>
    </tr>
    </form>
    </table>
<br><br>
<a href="../index.html"><img src="voltar img.jpg" alt="Botao de voltar" width="100"></a>
   </body>
   </html>
